    <text x="36" y="386" font-size="14">
      <tspan fill="#e3b341">  &#x25CF; </tspan><tspan fill="#e6edf3" font-weight="700">JavaScript</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#58a6ff">&#x25CF; </tspan><tspan fill="#e6edf3" font-weight="700">TypeScript</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#bc8cff">&#x25CF; </tspan><tspan fill="#e6edf3" font-weight="700">Python</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#3fb950">&#x25CF; </tspan><tspan fill="#e6edf3" font-weight="700">Solidity</tspan>
