<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Animated terminal - Tarun Agnihotri">
  <defs>
    <style>text { font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Menlo',monospace; }</style>
    <clipPath id="clip1">
      <rect x="271" y="102" width="0" height="18">
        <animate attributeName="width" begin="0.3s" dur="0.6s" values="0;500" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="clip2">
      <rect x="271" y="224" width="0" height="18">
        <animate attributeName="width" begin="2.0s" dur="0.7s" values="0;500" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="clip3">
      <rect x="271" y="348" width="0" height="18">
        <animate attributeName="width" begin="3.6s" dur="0.6s" values="0;500" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="clip4">
      <rect x="271" y="430" width="0" height="18">
        <animate attributeName="width" begin="5.0s" dur="0.8s" values="0;500" fill="freeze"/>
