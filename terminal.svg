    <text x="36" y="468" font-size="14"><tspan fill="#3fb950">  * </tspan><tspan fill="#e3b341">3a1f2b</tspan><tspan fill="#e6edf3" font-weight="700">  feat: integrate ICP canisters</tspan><tspan fill="#39c5cf">  (CivicLedger)</tspan></text>
    <text x="36" y="490" font-size="14"><tspan fill="#3fb950">  * </tspan><tspan fill="#e3b341">9c4e7d</tspan><tspan fill="#e6edf3" font-weight="700">  feat: train scheme recommender</tspan><tspan fill="#39c5cf">  (JanMitra)</tspan></text>
    <text x="36" y="512" font-size="14"><tspan fill="#3fb950">  * </tspan><tspan fill="#e3b341">2b8f1a</tspan><tspan fill="#e6edf3" font-weight="700">  fix: optimize anomaly detection</tspan><tspan fill="#39c5cf">  (RoadSense)</tspan></text>
    <text x="36" y="534" font-size="14"><tspan fill="#3fb950">  * </tspan><tspan fill="#e3b341">d5a3c0</tspan><tspan fill="#e6edf3" font-weight="700">  init: setup DevHive workspace</tspan></text>
  </g>

