      <tspan fill="#58a6ff">  &#x25CF; </tspan><tspan fill="#e6edf3" font-weight="700">Rust</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#f78166">&#x25CF; </tspan><tspan fill="#e6edf3" font-weight="700">C++</tspan>
      <tspan fill="#484f58">   </tspan>
      <tspan fill="#39c5cf">&#x25CF; </tspan><tspan fill="#e6edf3" font-weight="700">HTML/CSS</tspan>
