    <text x="36" y="284" font-size="14"><tspan fill="#58a6ff">  &#x25CF; </tspan><tspan fill="#58a6ff" font-weight="700">JanMitra/</tspan><tspan fill="#484f58">         JavaScript</tspan></text>
    <text x="36" y="306" font-size="14"><tspan fill="#3fb950">  &#x25CF; </tspan><tspan fill="#58a6ff" font-weight="700">RoadSense/</tspan><tspan fill="#484f58">        JavaScript</tspan></text>
