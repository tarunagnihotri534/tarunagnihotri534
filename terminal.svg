  <text x="36" y="116" font-size="14">
    <tspan fill="#3fb950">tarunagnihotri534</tspan><tspan fill="#58a6ff">@github</tspan><tspan fill="#e6edf3">:~$ </tspan>
  </text>
  <text x="271" y="116" font-size="14" font-weight="700" fill="#e6edf3" clip-path="url(#clip1)" opacity="0">whoami
